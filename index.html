<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Adat Racana Politeknik Negeri Sriwijaya</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
scroll-behavior:smooth;
cursor:none;
}

body{

background:#08111f;
overflow-x:hidden;
color:white;

}

/* HERO */

.hero{

min-height:100dvh;

background:
linear-gradient(rgba(0,0,0,.45),rgba(0,0,0,.45)),
url("poto/racana.jpg");

background-size:cover;
background-position:center;
background-repeat:no-repeat;
background-attachment:fixed;

position:relative;
overflow:hidden;

animation:bgZoom 18s ease-in-out infinite alternate;

}

@keyframes bgZoom{

0%{

background-size:cover;

}

100%{

background-size:110%;

}

}

/* BATIK */

.batik-left,
.batik-right{

position:absolute;

top:0;

width:180px;

height:100%;

opacity:.18;

pointer-events:none;

background-image:

radial-gradient(circle,#ffffff 2px,transparent 3px),
radial-gradient(circle,#d6d6d6 2px,transparent 3px),
radial-gradient(circle,#c0c0c0 2px,transparent 3px);

background-size:60px 60px;

animation:batikMove 10s linear infinite;

filter:drop-shadow(0 0 8px silver);

}

.batik-left{

left:0;

}

.batik-right{

right:0;

transform:scaleX(-1);

}

@keyframes batikMove{

0%{

background-position:0 0;

}

100%{

background-position:0 180px;

}

}

/* WATERMARK */

.hero-watermark{

position:absolute;

top:50%;
left:50%;

transform:translate(-50%,-50%);

width:75vw;

max-width:900px;

opacity:.12;

pointer-events:none;

filter:drop-shadow(0 0 50px gold);

animation:putar 100s linear infinite;

}

@keyframes putar{

from{

transform:translate(-50%,-50%) rotate(0deg);

}

to{

transform:translate(-50%,-50%) rotate(360deg);

}

}

/* NAVBAR */

nav{

position:fixed;

top:0;
left:0;

width:100%;

padding:20px 8%;

display:flex;

justify-content:space-between;

align-items:center;

background:rgba(255,255,255,.08);

backdrop-filter:blur(20px);

z-index:999;

}

.logo{

display:flex;

align-items:center;

gap:12px;

font-size:28px;

font-weight:800;

color:#FFD700;

}

.logo img{

width:60px;
height:60px;

border-radius:50%;

background:white;

padding:4px;

border:3px solid gold;

box-shadow:

0 0 20px gold,
0 0 50px rgba(255,215,0,.8),
0 15px 40px rgba(0,0,0,.6);

}

nav ul{

display:flex;

list-style:none;

gap:30px;

}

nav ul li a{

text-decoration:none;

color:white;

font-weight:600;

transition:.4s;

}

nav ul li a:hover{

color:#FFD700;

}

/* CONTENT */

.container{

position:relative;

z-index:10;

width:85%;

margin:auto;

padding-top:150px;

text-align:center;

}

.title img{

width:150px;
height:150px;

border-radius:50%;

background:white;

padding:8px;

border:3px solid gold;

box-shadow:

0 0 20px gold,
0 0 60px rgba(255,215,0,.8),
0 20px 50px rgba(0,0,0,.7);

animation:logoFloat 4s ease-in-out infinite;

}

@keyframes logoFloat{

50%{

transform:translateY(-15px);

}

}

.title h3{

margin-top:20px;

color:#FFD700;

letter-spacing:5px;

}

.title h1{

font-size:60px;

margin-top:15px;

text-shadow:

0 0 20px gold,
0 0 40px gold;

}

.card{

margin-top:40px;

background:rgba(255,255,255,.10);

backdrop-filter:blur(20px);

padding:40px;

border-radius:25px;

box-shadow:0 0 30px rgba(255,215,0,.2);

}

.card h2{

color:#FFD700;

margin-bottom:20px;

}

.card p{

font-size:18px;

line-height:2;

text-align:justify;

margin-bottom:15px;

}

/* BUTTON */

.button{

margin-top:35px;

}

.button a{

padding:15px 35px;

background:#FFD700;

color:black;

border-radius:40px;

text-decoration:none;

font-weight:bold;

box-shadow:0 0 20px gold;

transition:.4s;

}

.button a:hover{

background:white;

transform:translateY(-5px);

}

/* CURSOR */

.cursor{

position:fixed;

width:24px;
height:24px;

border:2px solid gold;

border-radius:50%;

pointer-events:none;

transform:translate(-50%,-50%);

box-shadow:

0 0 15px gold,
0 0 30px gold,
0 0 50px rgba(255,215,0,.8);

z-index:99999;

}

/* ===================== */
/* TABLET */
/* ===================== */

@media(max-width:1024px){

.title h1{

font-size:42px;

}

.hero-watermark{

width:80vw;

}

}

/* ===================== */
/* MOBILE */
/* ===================== */

@media(max-width:768px){

*{

cursor:auto;

}

.cursor{

display:none;

}

nav{

padding:15px 5%;

flex-direction:column;

gap:15px;

}

.logo{

font-size:20px;

}

.logo img{

width:45px;
height:45px;

}

nav ul{

gap:12px;

flex-wrap:wrap;

justify-content:center;

}

nav ul li a{

font-size:13px;

}

.hero{

background-attachment:scroll;

}

.batik-left,
.batik-right{

width:80px;

opacity:.08;

}

.hero-watermark{

width:90vw;

}

.container{

width:92%;

padding-top:180px;

}

.title img{

width:110px;
height:110px;

}

.title h3{

font-size:14px;

letter-spacing:3px;

}

.title h1{

font-size:28px;

line-height:1.4;

}

.card{

padding:25px;

border-radius:20px;

}

.card h2{

font-size:24px;

}

.card p{

font-size:15px;

line-height:1.8;

text-align:left;

}

.button a{

padding:12px 25px;

font-size:14px;

}

}

</style>

</head>

<body>

<div class="cursor"></div>

<nav>

<div class="logo">

<img src="poto/pramuka.jpeg">

<span>RACANA POLSRI</span>

</div>

<ul>

<li><a href="index.html">BERANDA</a></li>
<li><a href="sejarah pramuka.html">SEJARAH RACANA</a></li>
<li><a href="adat.html">ADAT RACANA</a></li>
<li><a href="budge.html">BADGE RACANA</a></li>
<li><a href="Untitled-1.html">STRUKTUR RACANA</a></li>

</ul>

</nav>

<section class="hero">

<div class="batik-left"></div>

<div class="batik-right"></div>

<img src="poto/graha.jpeg" class="hero-watermark">

<div class="container">

<div class="title">

<img src="poto/pramuka.jpeg">

<h3>GERAKAN PRAMUKA</h3>

<h1>RACANA POLITEKNIK NEGERI SRIWIJAYA</h1>

</div>
</div>

</section>

<script>

const cursor = document.querySelector(".cursor");

document.addEventListener("mousemove",(e)=>{

cursor.style.left=e.clientX+"px";
cursor.style.top=e.clientY+"px";

});

</script>

</body>
</html>
